name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync source
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.env*' \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }}" \
            ./ root@${{ secrets.SSH_HOST }}:/var/www/playon-landing-page/

      - name: Build & restart on server
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ secrets.SSH_PORT }} \
              root@${{ secrets.SSH_HOST }} << 'ENDSSH'
          set -e
          export NVM_DIR="/root/.nvm"
          source "$NVM_DIR/nvm.sh"
          cd /var/www/playon-landing-page
          npm install
          npm run build
          /root/.nvm/versions/node/v20.20.0/bin/pm2 restart playon-landing-page 2>/dev/null \
            || /root/.nvm/versions/node/v20.20.0/bin/pm2 start \
               'npm run start -- -p 3000' \
               --name playon-landing-page
          /root/.nvm/versions/node/v20.20.0/bin/pm2 save
          ENDSSH
